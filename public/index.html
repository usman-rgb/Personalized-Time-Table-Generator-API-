<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Timetable Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
  <header class="bg-primary text-white p-3 text-center">
    <h1>AI Timetable Generation System</h1>
    <button id="theme-toggle" class="btn btn-outline-light"><i class="fas fa-moon"></i> Dark Mode</button>
  </header>
  <main class="container my-4">
    <div class="accordion" id="manageSections">
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#coursesCollapse">Manage Courses</button></h2>
        <div id="coursesCollapse" class="accordion-collapse collapse show">
          <div class="accordion-body">
            <form id="course-form" class="row g-3">
              <div class="col-md-4"><input type="text" class="form-control" id="course-name" placeholder="Course Name" required></div>
              <div class="col-md-3"><input type="number" class="form-control" id="course-credits" placeholder="Credits" min="1" required></div>
              <div class="col-md-4"><input type="text" class="form-control" id="course-prereq" placeholder="Prerequisites (optional)"></div>
              <div class="col-md-1"><button type="submit" class="btn btn-primary">Add</button></div>
            </form>
            <input type="text" id="course-search" class="form-control my-3" placeholder="Search courses...">
            <ul id="course-list" class="list-group"></ul>
          </div>
        </div>
      </div>
      <!-- Similar accordion items for Instructors, Assignments, Availabilities -->
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#instructorsCollapse">Manage Instructors</button></h2>
        <div id="instructorsCollapse" class="accordion-collapse collapse">
          <div class="accordion-body">
            <form id="instructor-form" class="row g-3">
              <div class="col-md-5"><input type="text" class="form-control" id="instructor-name" placeholder="Name" required></div>
              <div class="col-md-5"><input type="email" class="form-control" id="instructor-email" placeholder="Email" required></div>
              <div class="col-md-2"><button type="submit" class="btn btn-primary">Add</button></div>
            </form>
            <input type="text" id="instructor-search" class="form-control my-3" placeholder="Search instructors...">
            <ul id="instructor-list" class="list-group"></ul>
          </div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#assignmentsCollapse">Assign Instructors to Courses</button></h2>
        <div id="assignmentsCollapse" class="accordion-collapse collapse">
          <div class="accordion-body">
            <form id="course-instructor-form" class="row g-3">
              <div class="col-md-5"><select id="assignment-course" class="form-select" required></select></div>
              <div class="col-md-5"><select id="assignment-instructor" class="form-select" required></select></div>
              <div class="col-md-2"><button type="submit" class="btn btn-primary">Assign</button></div>
            </form>
            <ul id="course-instructor-list" class="list-group mt-3"></ul>
          </div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#availabilitiesCollapse">Manage Availabilities</button></h2>
        <div id="availabilitiesCollapse" class="accordion-collapse collapse">
          <div class="accordion-body">
            <form id="availability-form" class="row g-3">
              <div class="col-md-4"><select id="availability-instructor" class="form-select" required></select></div>
              <div class="col-md-3"><input type="text" class="form-control" id="availability-day" placeholder="Day (e.g., Monday)" required></div>
              <div class="col-md-2"><input type="time" class="form-control" id="availability-start" required></div>
              <div class="col-md-2"><input type="time" class="form-control" id="availability-end" required></div>
              <div class="col-md-1"><button type="submit" class="btn btn-primary">Add</button></div>
            </form>
            <ul id="availability-list" class="list-group mt-3"></ul>
          </div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header"><button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#generateCollapse">Generate Timetable</button></h2>
        <div id="generateCollapse" class="accordion-collapse collapse">
          <div class="accordion-body">
            <button id="generate-btn" class="btn btn-success">Generate Using AI</button>
            <div id="loading" class="spinner-border text-primary mt-3" style="display: none;"></div>
            <div id="timetable-output" class="mt-3 card p-3"></div>
            <h5 class="mt-4">History</h5>
            <ul id="timetable-history" class="list-group"></ul>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Modals for edits -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Item</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="edit-form-container"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary" id="save-edit">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="position-fixed bottom-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
